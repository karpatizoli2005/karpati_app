
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tápanyagigények - Kárpáti Rendszer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; margin: 0; }
        .container { max-width: 1100px; margin: auto; }
        .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; }
        
        h1 { color: #2c3e50; margin-top: 0; font-size: 22px; border-bottom: 3px solid #2ecc71; padding-bottom: 10px; }
        
        /* SZERKESZTŐ MENÜ ELRENDEZÉSE */
        .form-row { 
            display: grid; 
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto; 
            gap: 12px; 
            align-items: end; 
        }
        
        label { display: block; font-size: 12px; font-weight: bold; color: #555; margin-bottom: 5px; }
        input { 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            width: 100%; 
            box-sizing: border-box; 
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #2ecc71; outline: none; }
        
        .add-btn { background: #2ecc71; color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; height: 45px; transition: background 0.2s; }
        .add-btn:hover { background: #27ae60; }
        
        .save-btn { background: #3498db; color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 10px; box-shadow: 0 4px 0 #2980b9; }
        .save-btn:active { transform: translateY(3px); box-shadow: none; }
        
        .back-btn { background: #34495e; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }

        /* TÁBLÁZAT */
        .table-container { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #34495e; color: white; padding: 15px; text-align: left; font-size: 14px; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 15px; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #fcfcfc; }

        .unit { font-size: 11px; color: #95a5a6; margin-left: 3px; font-weight: normal; }
        .delete-btn { color: #e74c3c; cursor: pointer; border: none; background: none; font-size: 20px; font-weight: bold; padding: 0 10px; }
        .delete-btn:hover { color: #c0392b; }

        @media (max-width: 800px) {
            .form-row { grid-template-columns: 1fr 1fr; }
            .add-btn { grid-column: span 2; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="back-btn" onclick="window.location.href='index.html'">⬅ VISSZA A FŐMENÜBE</button>

        <div class="box">
            <h1>Fajlagos tápanyagigények (kg/tonna terméshez)</h1>
            
            <div class="form-row">
                <div>
                    <label>Kultúra</label>
                    <input type="text" id="cropName" placeholder="pl. Kukorica">
                </div>
                <div>
                    <label>Nitrogén (N)</label>
                    <input type="number" id="valN" step="0.01" placeholder="0.0">
                </div>
                <div>
                    <label>Foszfor (P)</label>
                    <input type="number" id="valP" step="0.01" placeholder="0.0">
                </div>
                <div>
                    <label>Kálium (K)</label>
                    <input type="number" id="valK" step="0.01" placeholder="0.0">
                </div>
                <div>
                    <label>Kén (S)</label>
                    <input type="number" id="valS" step="0.01" placeholder="0.0">
                </div>
                <button class="add-btn" onclick="addCrop()">HOZZÁAD</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Kultúra</th>
                        <th>Nitrogén (N)</th>
                        <th>Foszfor (P)</th>
                        <th>Kálium (K)</th>
                        <th>Kén (S)</th>
                        <th style="width: 40px;"></th>
                    </tr>
                </thead>
                <tbody id="cropTableBody"></tbody>
            </table>
        </div>

        <button class="save-btn" onclick="saveToStorage()">💾 ADATOK VÉGLEGESÍTÉSE ÉS MENTÉSE</button>
    </div>

    <script>
        let cropDatabase = [];

        // Adatok betöltése localStorage-ból
        window.onload = function() {
            const savedData = localStorage.getItem('agro_tapanyag_db');
            if (savedData) {
                try {
                    cropDatabase = JSON.parse(savedData);
                    renderTable();
                } catch (e) {
                    console.error("Hiba az adatok betöltésekor", e);
                    cropDatabase = [];
                }
            }
        };

        function addCrop() {
            const name = document.getElementById('cropName').value.trim();
            const n = document.getElementById('valN').value;
            const p = document.getElementById('valP').value;
            const k = document.getElementById('valK').value;
            const s = document.getElementById('valS').value;

            if (!name || n === "" || p === "" || k === "" || s === "") {
                alert("Kérjük, minden mezőt töltsön ki!");
                return;
            }

            const newEntry = {
                id: Date.now(),
                name: name,
                n: parseFloat(n).toFixed(2),
                p: parseFloat(p).toFixed(2),
                k: parseFloat(k).toFixed(2),
                s: parseFloat(s).toFixed(2)
            };

            cropDatabase.push(newEntry);
            renderTable();
            clearInputs();
            document.getElementById('cropName').focus();
        }

        function renderTable() {
            const tbody = document.getElementById('cropTableBody');
            tbody.innerHTML = '';

            // ABC sorrendbe rakjuk a kultúrákat a táblázatban
            cropDatabase.sort((a, b) => a.name.localeCompare(b.name));

            cropDatabase.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${item.name}</strong></td>
                    <td>${item.n}<span class="unit">kg/t</span></td>
                    <td>${item.p}<span class="unit">kg/t</span></td>
                    <td>${item.k}<span class="unit">kg/t</span></td>
                    <td>${item.s}<span class="unit">kg/t</span></td>
                    <td><button class="delete-btn" onclick="deleteItem(${item.id})">×</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function deleteItem(id) {
            if (confirm("Biztosan törölni szeretné ezt a tételt?")) {
                cropDatabase = cropDatabase.filter(item => item.id !== id);
                renderTable();
            }
        }

        function clearInputs() {
            document.getElementById('cropName').value = '';
            document.getElementById('valN').value = '';
            document.getElementById('valP').value = '';
            document.getElementById('valK').value = '';
            document.getElementById('valS').value = '';
        }

        function saveToStorage() {
            localStorage.setItem('agro_tapanyag_db', JSON.stringify(cropDatabase));
            alert("Az adatbázis mentése sikeres volt!");
        }
    </script>
</body>
</html>
