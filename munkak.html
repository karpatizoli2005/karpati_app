
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Munkák - Feladatok</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .task-card { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            margin-bottom: 20px; 
            border-left: 10px solid #3498db; 
        }
        h1 { color: #2c3e50; margin-bottom: 30px; }
        h3 { margin-top: 0; color: #2980b9; font-size: 20px; }
        
        .action-buttons { display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
        
        .btn-done { background: #2ecc71; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-open { background: #34495e; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }

        .input-section { margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: bold; color: #7f8c8d; margin-bottom: 5px; }
        input, textarea { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; }
        textarea { grid-column: span 2; resize: vertical; }
        
        .back-btn { background: #7f8c8d; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        .header-flex { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }

        /* MODAL FRISSÍTÉS: Feljebb hozva és görgethető */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); overflow-y: auto; padding: 10px; }
        .modal-content { 
            background: white; 
            margin: 2% auto; /* Feljebb hozva */
            padding: 25px; 
            width: 90%; 
            max-width: 600px;
            border-radius: 12px; 
            max-height: 90vh; /* Ne lógjon le a képernyőről */
            overflow-y: auto; /* Belső görgetés ha túl hosszú az adat */
        }
        .close { float: right; font-size: 28px; cursor: pointer; color: #e74c3c; font-weight: bold; }
        .detail-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        .detail-table th, .detail-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .detail-table th { background: #f8f9fa; width: 40%; }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='index.html'">⬅ VISSZA A MENÜBE</button>
    <div class="container">
        <h1>Kiadott Feladatok</h1>
        <div id="taskList"></div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 style="border-bottom: 2px solid #3498db; padding-bottom: 5px;">Munkalap Részletei</h2>
            <div id="modalData"></div>
            <button class="btn-open" style="width:100%; margin-top:20px; background:#7f8c8d;" onclick="closeModal()">Bezárás</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('agro_gazd_naplo') || '[]');

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            const activeTasks = db.filter(x => x.status === 'planned');

            if(activeTasks.length === 0) {
                list.innerHTML = "<div class='task-card'><h3>Nincs jelenleg elvégzendő feladat.</h3></div>";
                return;
            }

            activeTasks.forEach(task => {
                const div = document.createElement('div');
                div.className = 'task-card';
                div.innerHTML = `
                    <div class="header-flex">
                        <div>
                            <h3>${task.folyamat}</h3>
                            <div style="font-size:14px; color:#555;"><b>Terület:</b> ${task.terulet}</div>
                        </div>
                        <div class="action-buttons">
                            <button class="btn-done" onclick="finishTask(${task.id})">✅ KÉSZ VAGYOK</button>
                            <button class="btn-open" onclick="showDetails(${task.id})">📂 Megnyitás</button>
                        </div>
                    </div>
                    
                    <div class="input-section">
                        <div class="input-group">
                            <label>Tényleges üzemóra</label>
                            <input type="number" id="uora_${task.id}" step="0.1" placeholder="pl. 4.5">
                        </div>
                        <div class="input-group">
                            <label>Munkaidő (óra)</label>
                            <input type="number" id="mido_${task.id}" step="0.5" placeholder="pl. 5.0">
                        </div>
                        <div class="input-group" style="grid-column: span 2;">
                            <label>Megjegyzés a munkához</label>
                            <textarea id="megj_${task.id}" rows="2" placeholder="Írj ide, ha valami fontos történt..."></textarea>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function showDetails(id) {
            const item = db.find(x => x.id === id);
            document.getElementById('modalData').innerHTML = `
                <table class="detail-table">
                    <tr><th>Dátum</th><td>${item.datum}</td></tr>
                    <tr><th>Terület</th><td>${item.terulet}</td></tr>
                    <tr><th>Méret</th><td>${item.ha} Ha</td></tr>
                    <tr><th>Kultúra</th><td>${item.kultura}</td></tr>
                    <tr><th>Munka</th><td>${item.folyamat}</td></tr>
                    <tr><th>Traktor</th><td>${item.traktor}</td></tr>
                    <tr><th>Eszköz</th><td>${item.eszkoz}</td></tr>
                    <tr><th>Felelős</th><td>${item.dolgozo}</td></tr>
                    <tr><th>Input név</th><td>${item.input_n || '-'}</td></tr>
                    <tr><th>Input menny.</th><td>${item.input_m || '-'}</td></tr>
                </table>
            `;
            document.getElementById('detailModal').style.display = "block";
        }

        function finishTask(id) {
            const uora = parseFloat(document.getElementById(`uora_${id}`).value);
            if(!uora || uora <= 0) { alert("Üzemóra megadása kötelező!"); return; }

            const idx = db.findIndex(x => x.id === id);
            db[idx].status = 'done';
            db[idx].uora = uora;
            db[idx].mido = parseFloat(document.getElementById(`mido_${id}`).value) || 0;
            db[idx].megj = document.getElementById(`megj_${id}`).value;
            db[idx].koltseg = (db[idx].traktorRate || 0) * uora;

            localStorage.setItem('agro_gazd_naplo', JSON.stringify(db));
            alert("Munka sikeresen rögzítve!");
            renderTasks();
        }

        function closeModal() { document.getElementById('detailModal').style.display = "none"; }
        renderTasks();
    </script>
</body>
</html>
