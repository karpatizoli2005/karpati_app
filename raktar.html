
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Raktárkezelő Rendszer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; }
        .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; }
        
        h1, h2 { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 15px; align-items: end; }
        label { display: block; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 5px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 14px; }
        
        .add-btn { background: #2ecc71; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .add-btn:hover { background: #27ae60; }
        .save-btn { background: #3498db; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        .back-btn { background: #ff4444; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #34495e; color: white; padding: 12px; text-align: left; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .stock-badge { background: #e8f4fd; color: #2980b9; padding: 6px 12px; border-radius: 20px; font-weight: bold; border: 1px solid #3498db; }
        .type-in { background: #d4edda; color: #155724; padding: 3px 8px; border-radius: 5px; font-weight: bold; font-size: 12px; }
        .type-out { background: #f8d7da; color: #721c24; padding: 3px 8px; border-radius: 5px; font-weight: bold; font-size: 12px; }
        .time-text { font-size: 12px; color: #7f8c8d; font-family: monospace; }
        
        .log-container { max-height: 400px; overflow-y: auto; }
        .del-btn-icon { color: #e74c3c; cursor: pointer; border: none; background: none; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='index.html'"> << VISSZA A MENÜBE</button>

    <div class="container">
        <div class="box">
            <h2>Mozgás rögzítése</h2>
            <div class="form-row">
                <div>
                    <label>Tétel kiválasztása</label>
                    <select id="itemSelect" onchange="checkNewItem(this)">
                        <option value="">-- Válassz --</option>
                        <option value="NEW">+ ÚJ TÉTEL FELVÉTELE</option>
                    </select>
                </div>
                <div id="newNameDiv" style="display:none;">
                    <label>Új tétel neve</label>
                    <input type="text" id="newItemName" placeholder="pl. Vetőmag">
                </div>
                <div>
                    <label>Típus</label>
                    <select id="moveType">
                        <option value="IN">Bevételezés (+)</option>
                        <option value="OUT">Kivételezés (-)</option>
                    </select>
                </div>
                <div>
                    <label>Mennyiség</label>
                    <input type="number" id="itemQty" placeholder="pl. 100">
                </div>
                <button class="add-btn" onclick="processMovement()">RÖGZÍT</button>
            </div>
        </div>

        <div class="box">
            <h2>Aktuális Készlet (Összesített)</h2>
            <table id="stockTable">
                <thead>
                    <tr>
                        <th>Tétel megnevezése</th>
                        <th>Aktuális készlet</th>
                        <th>Utolsó módosítás</th>
                        <th>Művelet</th>
                    </tr>
                </thead>
                <tbody id="stockBody"></tbody>
            </table>
        </div>

        <div class="box">
            <h2>Részletes Mozgásnapló (Múltbéli adatok)</h2>
            <div class="log-container">
                <table>
                    <thead>
                        <tr>
                            <th>Időpont</th>
                            <th>Tétel</th>
                            <th>Típus</th>
                            <th>Mennyiség</th>
                            <th>Művelet</th>
                        </tr>
                    </thead>
                    <tbody id="logBody"></tbody>
                </table>
            </div>
        </div>

        <button class="save-btn" onclick="saveToDisk()">ADATOK VÉGLEGESÍTÉSE ÉS MENTÉSE</button>
    </div>

    <script>
        let inventory = {};   // Aktuális egyenlegek
        let logEntries = [];  // Minden egyes tranzakció listája

        function checkNewItem(sel) {
            document.getElementById('newNameDiv').style.display = (sel.value === 'NEW') ? 'block' : 'none';
        }

        function processMovement() {
            let itemName = document.getElementById('itemSelect').value;
            if (itemName === 'NEW') itemName = document.getElementById('newItemName').value;
            
            const type = document.getElementById('moveType').value;
            const qty = parseFloat(document.getElementById('itemQty').value);

            if (!itemName || isNaN(qty)) { alert("Kérlek töltsd ki az adatokat!"); return; }

            const now = new Date().toLocaleString('hu-HU');

            const entry = {
                time: now,
                name: itemName,
                type: type,
                qty: qty
            };
            logEntries.unshift(entry);

            if (!inventory[itemName]) inventory[itemName] = { qty: 0, lastUpdate: "" };
            
            if (type === 'IN') inventory[itemName].qty += qty;
            else inventory[itemName].qty -= qty;
            
            inventory[itemName].lastUpdate = now;

            updateUI();
            resetForm();
        }

        function updateUI() {
            const sBody = document.getElementById('stockBody');
            const select = document.getElementById('itemSelect');
            sBody.innerHTML = '';
            select.innerHTML = '<option value="">-- Válassz --</option><option value="NEW">+ ÚJ TÉTEL FELVÉTELE</option>';

            for (let item in inventory) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${item}</b></td>
                    <td><span class="stock-badge">${inventory[item].qty}</span></td>
                    <td class="time-text">${inventory[item].lastUpdate}</td>
                    <td><button class="del-btn-icon" onclick="deleteStockItem('${item}')" title="Tétel teljes törlése">×</button></td>
                `;
                sBody.appendChild(tr);

                const opt = document.createElement('option');
                opt.value = item; opt.innerText = item;
                select.appendChild(opt);
            }

            const lBody = document.getElementById('logBody');
            lBody.innerHTML = '';
            logEntries.forEach((entry, index) => {
                const tr = document.createElement('tr');
                const typeClass = entry.type === 'IN' ? 'type-in' : 'type-out';
                const typeText = entry.type === 'IN' ? 'BEVÉTEL' : 'KIADÁS';
                tr.innerHTML = `
                    <td class="time-text">${entry.time}</td>
                    <td><b>${entry.name}</b></td>
                    <td><span class="${typeClass}">${typeText}</span></td>
                    <td>${entry.type === 'IN' ? '+' : '-'}${entry.qty}</td>
                    <td><button onclick="deleteLogEntry(${index})" class="del-btn-icon" title="Bejegyzés törlése">×</button></td>
                `;
                lBody.appendChild(tr);
            });
        }

        function deleteStockItem(itemName) {
            if (confirm(`Biztosan törölni szeretnéd a(z) "${itemName}" tételt és minden készletadatát?`)) {
                // Töröljük az inventory-ból
                delete inventory[itemName];
                // Kiszűrjük a log-ból is a tételhez tartozó mozgásokat (opcionális, de így tiszta)
                logEntries = logEntries.filter(entry => entry.name !== itemName);
                updateUI();
            }
        }

        function deleteLogEntry(index) {
            const entry = logEntries[index];
            if (inventory[entry.name]) {
                if (entry.type === 'IN') inventory[entry.name].qty -= entry.qty;
                else inventory[entry.name].qty += entry.qty;
            }
            logEntries.splice(index, 1);
            updateUI();
        }

        function resetForm() {
            document.getElementById('itemSelect').value = '';
            document.getElementById('newItemName').value = '';
            document.getElementById('itemQty').value = '';
            document.getElementById('newNameDiv').style.display = 'none';
        }

        function saveToDisk() {
            const fullData = { inv: inventory, logs: logEntries };
            localStorage.setItem('raktar_v5_full', JSON.stringify(fullData));
            alert("Minden mozgás és készletadat mentve!");
        }

        function loadData() {
            const saved = localStorage.getItem('raktar_v5_full');
            if (saved) {
                const parsed = JSON.parse(saved);
                inventory = parsed.inv || {};
                logEntries = parsed.logs || [];
                updateUI();
            }
        }

        loadData();
    </script>
</body>
</html>
