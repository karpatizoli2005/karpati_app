
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kárpáti Rendszer - Pénztárkönyv</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; margin: 0; color: #333; }
        .container { max-width: 1000px; margin: auto; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        .header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .balance-box { padding: 15px; border-radius: 12px; text-align: center; color: white; }
        .bg-cash { background: #27ae60; }
        .bg-bank { background: #2980b9; }
        .balance-val { font-size: 22px; font-weight: bold; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; align-items: end; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #666; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .hidden { display: none; }
        .add-btn { background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .back-btn { background: #ff4444; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; }
        .del-btn { color: #e74c3c; border: none; background: none; cursor: pointer; font-weight: bold; font-size: 18px; }
        
        .filter-bar { background: #eee; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; gap: 10px; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; font-size: 13px; }
        .type-in { color: #27ae60; font-weight: bold; }
        .type-out { color: #e74c3c; font-weight: bold; }
        .tag { font-size: 10px; padding: 2px 5px; border-radius: 4px; background: #f8f9fa; border: 1px solid #ddd; margin-left: 5px; display: inline-block; }

        .chart-container { height: 350px; position: relative; margin-top: 10px; }

        @media (max-width: 600px) {
            .header-grid { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='index.html'"> << VISSZA</button>

    <div class="container">
        <div class="header-grid">
            <div class="balance-box bg-cash">
                <div>KÉSZPÉNZ</div>
                <div id="cashVal" class="balance-val">0 Ft</div>
            </div>
            <div class="balance-box bg-bank">
                <div>BANKI EGYENLEG</div>
                <div id="bankVal" class="balance-val">0 Ft</div>
            </div>
        </div>

        <div class="box">
            <h2>Új tranzakció</h2>
            <div class="form-grid">
                <div>
                    <label>Megnevezés</label>
                    <input type="text" id="tDesc" placeholder="pl. Támogatás érkezett">
                </div>
                <div>
                    <label>Irány</label>
                    <select id="tDirection" onchange="toggleCategoryOptions()">
                        <option value="OUT" selected>Kiadás (-)</option>
                        <option value="IN">Bevétel (+)</option>
                    </select>
                </div>
                <div>
                    <label>Kategória</label>
                    <select id="tCategory" onchange="checkSpecialCategory()"></select>
                </div>
                <div id="traktorWrapper" class="hidden">
                    <label>Melyik traktor?</label>
                    <select id="tTraktor"></select>
                </div>
                <div>
                    <label>Mód</label>
                    <select id="tMethod">
                        <option value="Készpénz">Készpénz</option>
                        <option value="Bank kártya">Bank kártya</option>
                    </select>
                </div>
                <div>
                    <label>Összeg (Ft)</label>
                    <input type="number" id="tAmt" placeholder="0">
                </div>
            </div>
            <button class="add-btn" onclick="addTransaction()">RÖGZÍTÉS</button>
        </div>

        <div class="box">
            <h2>Napló</h2>
            <div class="filter-bar">
                <small>Szűrés:</small>
                <select id="filterType" onchange="render()">
                    <option value="ALL">Összes</option>
                    <option value="IN">Csak Bevétel</option>
                    <option value="OUT">Csak Kiadás</option>
                </select>
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Dátum</th>
                            <th>Leírás / Kategória</th>
                            <th>Mód</th>
                            <th>Összeg</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tBody"></tbody>
                </table>
            </div>
        </div>

        <div class="box">
            <h2>Kiadások eloszlása kategóriák szerint</h2>
            <div class="chart-container">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('transactions_v2') || '[]');
        let myChart = null;

        const inCategories = ["Támogatás", "Burgonya értékesítés", "Gabona értékesítés", "Bérmunka", "Egyéb", "Uj"];
        const outCategories = ["Alkatrész", "Inputanyag", "Vetőmag", "Üzemanyag", "Szerszám", "Munkabér", "Tőke", "Földbérlet", "Egyéb", "Uj"];

        function toggleCategoryOptions() {
            const dir = document.getElementById('tDirection').value;
            const catSel = document.getElementById('tCategory');
            catSel.innerHTML = '';
            const list = (dir === 'IN') ? inCategories : outCategories;
            list.forEach(c => {
                catSel.innerHTML += `<option value="${c}">${c === 'Uj' ? '+ Új hozzáadása' : c}</option>`;
            });
            checkSpecialCategory();
        }

        function checkSpecialCategory() {
            const cat = document.getElementById('tCategory').value;
            const tWrap = document.getElementById('traktorWrapper');
            if(cat === 'Alkatrész') {
                tWrap.classList.remove('hidden');
                loadTraktors();
            } else {
                tWrap.classList.add('hidden');
            }
        }

        function loadTraktors() {
            const data = localStorage.getItem('geppark_adatok') || '[]';
            const traktors = JSON.parse(data);
            const sel = document.getElementById('tTraktor');
            sel.innerHTML = '';
            if(traktors.length === 0) {
                sel.innerHTML = '<option value="">Nincs gép rögzítve!</option>';
                return;
            }
            traktors.forEach(t => {
                const marka = t.m || "Ismeretlen gép";
                sel.innerHTML += `<option value="${marka}">${marka}</option>`;
            });
        }

        function addTransaction() {
            const desc = document.getElementById('tDesc').value;
            const dir = document.getElementById('tDirection').value;
            const cat = document.getElementById('tCategory').value;
            const method = document.getElementById('tMethod').value;
            const amt = parseInt(document.getElementById('tAmt').value);
            let finalDesc = desc;

            if(cat === 'Alkatrész') {
                const trk = document.getElementById('tTraktor').value;
                if(trk) finalDesc += " (" + trk + ")";
            }

            if(!desc || isNaN(amt)) return;

            transactions.unshift({
                id: Date.now(),
                date: new Date().toLocaleDateString('hu-HU'),
                desc: finalDesc,
                category: cat,
                direction: dir,
                method: method,
                amt: (dir === 'IN' ? amt : -amt)
            });

            save();
            document.getElementById('tDesc').value = '';
            document.getElementById('tAmt').value = '';
        }

        function deleteT(id) {
            if(confirm("Biztosan törlöd?")) {
                transactions = transactions.filter(t => t.id !== id);
                save();
            }
        }

        function save() {
            localStorage.setItem('transactions_v2', JSON.stringify(transactions));
            render();
        }

        function render() {
            const body = document.getElementById('tBody');
            const filter = document.getElementById('filterType').value;
            body.innerHTML = '';
            let cTot = 0; let bTot = 0;
            let chartData = {};

            transactions.forEach(t => {
                // Egyenleg számítás (szűréstől függetlenül)
                if(t.method === 'Készpénz') cTot += t.amt; else bTot += t.amt;
                
                // Diagram adatok (csak kiadások)
                if(t.direction === 'OUT') {
                    chartData[t.category] = (chartData[t.category] || 0) + Math.abs(t.amt);
                }

                // Megjelenítés szűrés alapján
                if(filter === 'ALL' || filter === t.direction) {
                    body.innerHTML += `
                        <tr>
                            <td><small>${t.date}</small></td>
                            <td><b>${t.desc}</b><br><small class="tag">${t.category}</small></td>
                            <td><small>${t.method}</small></td>
                            <td class="${t.amt > 0 ? 'type-in' : 'type-out'}">${t.amt.toLocaleString()} Ft</td>
                            <td><button class="del-btn" onclick="deleteT(${t.id})">×</button></td>
                        </tr>`;
                }
            });

            document.getElementById('cashVal').innerText = cTot.toLocaleString() + " Ft";
            document.getElementById('bankVal').innerText = bTot.toLocaleString() + " Ft";
            updateChart(chartData);
        }

        function updateChart(data) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if(myChart) myChart.destroy();
            if(Object.keys(data).length === 0) return;

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        label: 'Kiadás (Ft)',
                        data: Object.values(data),
                        backgroundColor: '#e74c3c',
                        borderRadius: 8
                    }]
                },
                options: { 
                    indexAxis: 'y', 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }

        toggleCategoryOptions();
        render();
    </script>
</body>
</html>
