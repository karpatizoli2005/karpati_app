
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Kollégák és Jogosultságok</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script>
        // A te egyedi adataid:
        const firebaseConfig = {
          apiKey: "AIzaSyB74XnNg_dWDBalyTPd1fAUOlQT_0rddaE",
          authDomain: "karpati-rendszer.firebaseapp.com",
          databaseURL: "https://karpati-rendszer-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "karpati-rendszer",
          storageBucket: "karpati-rendszer.firebasestorage.app",
          messagingSenderId: "743687645148",
          appId: "1:743687645148:web:458a63fb7b4a874f605119"
        };

        // Inicializálás (Figyelj, hogy ne legyen hiba, ha többször fut le)
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
    </script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h2 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .perm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .check-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .check-item input { width: auto; }
        .add-btn { background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        .back-btn { background: #ff4444; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #34495e; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .access-list { font-size: 11px; color: #666; font-style: italic; }
        .pass-tag { background: #eee; padding: 2px 5px; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='index.html'"> << VISSZA</button>

    <div class="container">
        <div class="box">
            <h2>Új kolléga rögzítése (Felhő szinkron)</h2>
            <div class="form-grid">
                <div><label>Név</label><input type="text" id="kNev" placeholder="Példa János"></div>
                <div><label>Telefonszám</label><input type="text" id="kTel" placeholder="+36 30..."></div>
                <div><label>Belépési kód (PIN)</label><input type="text" id="kPin" placeholder="4 jegyű szám"></div>
            </div>

            <label>Engedélyezett ablakok:</label>
            <div class="perm-grid" id="permChecks">
                <div class="check-item"><input type="checkbox" value="Raktár"> Raktár</div>
                <div class="check-item"><input type="checkbox" value="Traktorok"> Traktorok</div>
                <div class="check-item"><input type="checkbox" value="Területek"> Területek</div>
                <div class="check-item"><input type="checkbox" value="Kollégák"> Kollégák</div>
                <div class="check-item"><input type="checkbox" value="Pénztárkönyv"> Pénztárkönyv</div>
                <div class="check-item"><input type="checkbox" value="Elszámolás"> Elszámolás</div>
            </div>

            <button class="add-btn" onclick="addWorker()">MENTÉS A FELHŐBE</button>
        </div>

        <div class="box">
            <h2>Aktív dolgozók listája</h2>
            <table>
                <thead>
                    <tr>
                        <th>Név / Tel.</th>
                        <th>Kód</th>
                        <th>Jogosultságok</th>
                        <th>Művelet</th>
                    </tr>
                </thead>
                <tbody id="workerBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Real-time figyelés: ha bárki változik, frissül a lista
        db.ref('kollegak').on('value', (snapshot) => {
            const workers = snapshot.val() || {};
            renderWorkers(workers);
        });

        function addWorker() {
            const checkboxes = document.querySelectorAll('#permChecks input:checked');
            const perms = Array.from(checkboxes).map(cb => cb.value);
            
            const worker = {
                nev: document.getElementById('kNev').value,
                tel: document.getElementById('kTel').value,
                pin: document.getElementById('kPin').value,
                perms: perms
            };

            if(!worker.nev || !worker.pin) { alert("Név és PIN kötelező!"); return; }

            // Firebase mentés: automatikusan generál egy egyedi ID-t
            db.ref('kollegak').push(worker).then(() => {
                // Mezők ürítése
                document.getElementById('kNev').value = '';
                document.getElementById('kTel').value = '';
                document.getElementById('kPin').value = '';
                document.querySelectorAll('#permChecks input').forEach(cb => cb.checked = false);
            });
        }

        function renderWorkers(workers) {
            const tbody = document.getElementById('workerBody');
            tbody.innerHTML = '';
            
            for(let id in workers) {
                const w = workers[id];
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${w.nev}</b><br><small>${w.tel}</small></td>
                    <td><span class="pass-tag">${w.pin}</span></td>
                    <td class="access-list">${w.perms ? w.perms.join(', ') : 'Nincs jog'}</td>
                    <td><button onclick="db.ref('kollegak/${id}').remove()" style="color:red; border:none; background:none; cursor:pointer;">Törlés</button></td>
                `;
                tbody.appendChild(tr);
            }
        }
    </script>
</body>
</html>
