
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kárpáti Rendszer - Elszámolás</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; margin: 0; }
        .container { max-width: 900px; margin: auto; }
        .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; }
        
        h2 { color: #2c3e50; border-bottom: 2px solid #e67e22; padding-bottom: 10px; margin-top: 0; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 2fr 1fr auto; gap: 10px; align-items: end; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #666; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; }
        
        .add-btn { background: #e67e22; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .back-btn { background: #ff4444; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #34495e; color: white; padding: 12px; text-align: left; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .worker-tag { background: #fff3e0; color: #e65100; padding: 4px 8px; border-radius: 4px; font-weight: bold; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .container { padding: 10px; }
            th, td { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='index.html'"> << VISSZA</button>

    <div class="container">
        <div class="box">
            <h2>Napi munka elszámolása</h2>
            <div class="form-grid">
                <div>
                    <label>Kolléga</label>
                    <select id="workerSelect"></select>
                </div>
                <div>
                    <label>Munka leírása</label>
                    <input type="text" id="workDesc" placeholder="pl. Aratás Belső-tábla">
                </div>
                <div>
                    <label>Óraszám</label>
                    <input type="number" id="workHours" placeholder="8">
                </div>
                <button class="add-btn" onclick="addWork()">RÖGZÍT</button>
            </div>
        </div>

        <div class="box" style="overflow-x: auto;">
            <h2>Rögzített munkák</h2>
            <table>
                <thead>
                    <tr>
                        <th>Dátum</th>
                        <th>Név</th>
                        <th>Feladat</th>
                        <th>Idő</th>
                        <th>Művelet</th>
                    </tr>
                </thead>
                <tbody id="workBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let workHistory = JSON.parse(localStorage.getItem('work_history') || '[]');

        function loadWorkers() {
            const workers = JSON.parse(localStorage.getItem('vallalat_kollegak') || '[]');
            const sel = document.getElementById('workerSelect');
            sel.innerHTML = '<option value="">-- Válassz --</option>';
            workers.forEach(w => {
                sel.innerHTML += `<option value="${w.nev}">${w.nev}</option>`;
            });
        }

        function addWork() {
            const name = document.getElementById('workerSelect').value;
            const desc = document.getElementById('workDesc').value;
            const hrs = document.getElementById('workHours').value;

            if(!name || !desc || !hrs) { alert("Minden mezőt tölts ki!"); return; }

            const entry = {
                id: Date.now(),
                date: new Date().toLocaleDateString('hu-HU'),
                name: name,
                desc: desc,
                hrs: hrs
            };

            workHistory.unshift(entry);
            saveAndRender();
            
            document.getElementById('workDesc').value = '';
            document.getElementById('workHours').value = '';
        }

        function deleteWork(id) {
            workHistory = workHistory.filter(h => h.id !== id);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('work_history', JSON.stringify(workHistory));
            render();
        }

        function render() {
            const body = document.getElementById('workBody');
            body.innerHTML = '';
            workHistory.forEach(h => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color: #888; font-size: 11px;">${h.date}</td>
                    <td><span class="worker-tag">${h.name}</span></td>
                    <td>${h.desc}</td>
                    <td><b>${h.hrs} óra</b></td>
                    <td><button onclick="deleteWork(${h.id})" style="color:red; border:none; background:none; cursor:pointer;">Törlés</button></td>
                `;
                body.appendChild(tr);
            });
        }

        loadWorkers();
        render();
    </script>
</body>
</html>
