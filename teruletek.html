
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Felhő Területek</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script>
        // A te egyedi adataid:
        const firebaseConfig = {
          apiKey: "AIzaSyB74XnNg_dWDBalyTPd1fAUOlQT_0rddaE",
          authDomain: "karpati-rendszer.firebaseapp.com",
          databaseURL: "https://karpati-rendszer-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "karpati-rendszer",
          storageBucket: "karpati-rendszer.firebasestorage.app",
          messagingSenderId: "743687645148",
          appId: "1:743687645148:web:458a63fb7b4a874f605119"
        };

        // Inicializálás (Figyelj, hogy ne legyen hiba, ha többször fut le)
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
    </script>

    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; background: #f4f7f6; }
        .main-content { display: flex; gap: 20px; flex: 1; min-height: 0; }
        .sidebar { width: 300px; background: white; padding: 20px; border-radius: 12px; overflow-y: auto; }
        #map { flex: 1; border-radius: 12px; }
        .back-btn { background: #ff4444; color: white; padding: 10px; border: none; cursor: pointer; margin-bottom: 10px; }
        .save-btn { background: #2ecc71; color: white; width: 100%; padding: 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='index.html'"> << VISSZA</button>
    <div class="main-content">
        <div class="sidebar">
            <h3>Új terület</h3>
            <input type="text" id="tNev" placeholder="Név" style="width:100%; margin-bottom:10px;">
            <button class="save-btn" onclick="saveArea()">MENTÉS</button>
            <div id="areaList"></div>
        </div>
        <div id="map"></div>
    </div>
    <script>
        var map = L.map('map').setView([47.16, 19.50], 7);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        
        var currentPoints = [];
        var currentPolygon = null;

        map.on('click', (e) => {
            currentPoints.push([e.latlng.lat, e.latlng.lng]);
            if (currentPolygon) map.removeLayer(currentPolygon);
            currentPolygon = L.polygon(currentPoints, {color: 'red'}).addTo(map);
        });

        db.ref('teruletek').on('value', (snapshot) => {
            const areas = snapshot.val() || {};
            const listDiv = document.getElementById('areaList');
            listDiv.innerHTML = '';
            
            // Térkép tisztítása és újrarajzolása
            map.eachLayer((layer) => { if(layer instanceof L.Polygon) map.removeLayer(layer); });

            for(let id in areas) {
                const area = areas[id];
                listDiv.innerHTML += `<div style="padding:10px; border-bottom:1px solid #ddd;"><b>${area.nev}</b></div>`;
                L.polygon(area.coords, {color: 'blue'}).addTo(map).bindPopup(area.nev);
            }
        });

        function saveArea() {
            const nev = document.getElementById('tNev').value;
            if(!nev || currentPoints.length < 3) return alert("Rajzold körbe!");
            db.ref('teruletek').push({ nev: nev, coords: currentPoints });
            currentPoints = [];
        }
    </script>
</body>
</html>
