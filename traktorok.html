
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Traktorok</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #3498db; color: white; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #eee; padding: 20px; border-radius: 10px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        .add-btn { background: #2ecc71; color: white; width: 100%; }
        .save-btn { background: #3498db; color: white; width: 100%; }
        .back-btn { background: #ff4444; color: white; }
        .del-btn { background: #e74c3c; color: white; font-size: 12px; }
        .edit-btn { background: #f1c40f; color: white; font-size: 12px; }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='index.html'"> << VISSZA</button>
    <div class="container">
        <h1>TRAKTOR NYILVÁNTARTÁS</h1>
        <table>
            <thead><tr><th>Márka</th><th>Tulaj</th><th>Műszaki</th><th>Üó. Költség</th><th>Művelet</th></tr></thead>
            <tbody id="tBody"></tbody>
        </table>
        <div class="form-grid">
            <input type="text" id="m" placeholder="Márka">
            <input type="text" id="t" placeholder="Tulajdonos">
            <input type="text" id="u" placeholder="Üzemanyag">
            <input type="number" id="v" placeholder="Vételár">
            <input type="number" id="uk" placeholder="Üzemóra ktg">
            <input type="number" id="b" placeholder="Biztosítás">
            <input type="date" id="musz">
            <button class="add-btn" style="grid-column: span 2;" onclick="addT()">HOZZÁADÁS</button>
        </div>
        <button class="save-btn" onclick="saveT()">ADATOK MENTÉSE</button>
    </div>
    <script>
    function addT() {
        // Kinyerjük az összes értéket a mezőkből
        const obj = { 
            m: document.getElementById('m').value, 
            t: document.getElementById('t').value, 
            u: document.getElementById('u').value, 
            v: document.getElementById('v').value, 
            uk: document.getElementById('uk').value, 
            b: document.getElementById('b').value, 
            musz: document.getElementById('musz').value 
        };

        if(!obj.m) {
            alert("A márka kitöltése kötelező!");
            return;
        }

        renderT(obj);
        
        // Mezők ürítése hozzáadás után
        ['m','t','u','v','uk','b','musz'].forEach(id => document.getElementById(id).value = '');
    }

    function renderT(o) {
        const tr = document.createElement('tr');
        // Biztosítjuk, hogy ne legyen undefined kijelzés (ha üres, akkor 0 vagy - jelenik meg)
        tr.innerHTML = `
            <td><b>${o.m || '-'}</b><br><small>Üzemanyag: ${o.u || '-'}</small></td>
            <td>${o.t || '-'}</td>
            <td>${o.musz || '-'}</td>
            <td>
                Óradíj: ${o.uk || '0'} Ft<br>
                <small>Bizt: ${o.b || '0'} Ft | Ár: ${o.v || '0'} Ft</small>
            </td>
            <td>
                <button class="edit-btn" onclick="editT(this, ${JSON.stringify(o).replace(/"/g, '&quot;')})">Szerkeszt</button>
                <button class="del-btn" onclick="this.parentElement.parentElement.remove()">X</button>
            </td>`;
        document.getElementById('tBody').appendChild(tr);
    }

    function editT(btn, data) {
        // Visszatöltjük az adatokat a beviteli mezőkbe
        document.getElementById('m').value = data.m;
        document.getElementById('t').value = data.t;
        document.getElementById('u').value = data.u;
        document.getElementById('v').value = data.v;
        document.getElementById('uk').value = data.uk;
        document.getElementById('b').value = data.b;
        document.getElementById('musz').value = data.musz;
        
        // Töröljük a régi sort a táblázatból
        btn.parentElement.parentElement.remove();
    }

    function saveT() {
        const arr = [];
        // A mentésnél most már nem a szövegből bogarásszuk ki, hanem a szerkesztő gomb adataiból
        document.querySelectorAll('#tBody tr').forEach(tr => {
            const editBtn = tr.querySelector('.edit-btn');
            // Kinyerjük a gombra mentett adatot (trükkös, de a legbiztosabb)
            const onclickAttr = editBtn.getAttribute('onclick');
            const jsonStr = onclickAttr.substring(onclickAttr.indexOf('{'), onclickAttr.lastIndexOf('}') + 1);
            arr.push(JSON.parse(jsonStr.replace(/&quot;/g, '"')));
        });
        
        localStorage.setItem('geppark_adatok', JSON.stringify(arr));
        alert('Minden adat (üzemanyag, biztosítás, vételár is) elmentve!');
    }

    function loadT() {
        const d = JSON.parse(localStorage.getItem('traktor_data') || '[]');
        d.forEach(o => renderT(o));
    }
    
    loadT();
    </script>
</body>
</html>
